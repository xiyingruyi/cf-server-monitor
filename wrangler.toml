# Cloudflare Workers 配置，线上已由deploy.yml接管，这里仅供本地测试
name = "cf-server-monitor"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# 定时任务配置（UTC）
# - 每天UTC 23点50分：执行数据清理
# - 每分钟：执行离线节点检测
# - 注意同步修改deploy和index.js scheduled函数里面的值
[triggers]
crons = ["50 23 * * *", "*/1 * * * *"]

[assets]
directory = "./dist"
binding = "ASSETS"

[vars]
API_SECRET = "xi123456"

[[d1_databases]]
binding = "DB"
database_name = "server-monitor-db"
database_id = "d50c5777-87a9-448c-8b3a-fb7112dcf199"  # 本地开发时用 "local" 即可

# Durable Objects：实时指标广播中心
# 注意：首次部署前需要执行 `wrangler durable-object create MetricsBroadcaster --class MetricsBroadcaster`
# 或者在部署后，wrangler 会自动创建对应的 DO namespace。
[[durable_objects.bindings]]
name = "METRICS_BROADCASTER"
class_name = "MetricsBroadcaster"
script_name = "cf-server-monitor"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MetricsBroadcaster"]

# 开发服务器配置
[dev]
port = 8787
local_protocol = "http"